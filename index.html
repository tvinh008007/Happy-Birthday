<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMSN 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    color: white;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <!-- ✅ FIX CHỮ HOA -->
    <source src="nhacnen.MP3" type="audio/mpeg">
</audio>

<div class="box" id="main"></div>

<script>
let isPlaying = false;

// ✅ bật nhạc khi user click
document.addEventListener("click", () => {
    const audio = document.getElementById("bgMusic");
    if (!isPlaying) {
        audio.volume = 0.6;
        audio.play().then(() => {
            isPlaying = true;
        }).catch(() => {});
    }
});

// test đơn giản trước
function page1(){
    document.getElementById("main").innerHTML = `
        <h1>🎂 Happy Birthday 🎂</h1>
        <button onclick="boom()">Bấm thử 🎉</button>
    `;
}

function boom(){
    confetti({
        particleCount: 200,
        spread: 100
    });
}

page1();
</script>

</body>
</html>
