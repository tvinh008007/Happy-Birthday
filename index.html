<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMSN 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;

    background: 
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
        url('https://lh3.googleusercontent.com/d/1Yx0jJuyUAgEaBXOQPywPXubilDKx_YFo') no-repeat center center / cover;

    overflow: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.box {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    padding: 60px 40px;
    width: 95%;
    max-width: 750px;
    min-height: 350px;
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
}

.fade-out {
    opacity: 0;
    transform: scale(0.8) translateY(30px);
    filter: blur(10px);
}

h1 { 
    font-size: 3em; 
    margin-bottom: 10px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    animation: floating 3s ease-in-out infinite;
}

@keyframes floating {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

h2 { 
    color: #ffe600; 
    font-size: 2em; 
    text-shadow: 0 0 10px rgba(255, 222, 0, 0.5);
}

.equation {
    background: rgba(0, 0, 0, 0.4);
    padding: 20px;
    border-radius: 15px;
    margin: 25px 0;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.2em;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

input {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 50px;
    border: 2px solid transparent;
    width: 75%;
    background: rgba(255, 255, 255, 0.9);
    color: #333;
    font-weight: 600;
    transition: all 0.3s ease;
    text-align: center;
    outline: none;
}

input:focus {
    border: 2px solid #ffe600;
    box-shadow: 0 0 20px rgba(255, 230, 0, 0.4);
    transform: scale(1.02);
}

button {
    padding: 15px 35px;
    font-size: 1.2em;
    font-weight: 800;
    border-radius: 50px;
    background: linear-gradient(45deg, #ffe600, #ff9900);
    color: #2a1b3d;
    border: none;
    margin-top: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
}

button:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 10px 25px rgba(255, 153, 0, 0.6);
}

.money-text {
    font-size: 4em;
    font-weight: 800;
    background: linear-gradient(to right, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    margin: 20px 0;
}

p {
    font-size: 1.2em;
    opacity: 0.9;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="nhacnen.MP3" type="audio/mpeg">
</audio>

<div class="box" id="main"></div>

<script>
/* load lại kết quả */
let savedMoney = localStorage.getItem("cmsn_money");
if(savedMoney){
    window.addEventListener("load", ()=>{
        page4(Number(savedMoney));
    });
}

let chosen = 0;
let confettiInterval1; 
let isMusicPlaying = false;

function playMusic() {
    let bgm = document.getElementById("bgMusic");
    if (!isMusicPlaying) {
        bgm.volume = 0.6;
        let playPromise = bgm.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                isMusicPlaying = true;
            }).catch(error => {
                console.log("Trình duyệt chặn autoplay");
            });
        }
    }
}

document.body.addEventListener('click', playMusic);

function startContinuousConfetti() {
    let duration = 15000;
    let end = Date.now() + duration;

    confettiInterval1 = setInterval(()=>{
        if(Date.now()>end) return clearInterval(confettiInterval1);
        confetti({particleCount:50,spread:360});
    },250);
}

function stopConfetti(){ clearInterval(confettiInterval1); }

function transition(nextPage){
    stopConfetti();
    playMusic();
    let box = document.getElementById("main");
    box.classList.add("fade-out");
    setTimeout(()=>{
        nextPage();
        box.classList.remove("fade-out");
    },600);
}

function page1(){
    document.getElementById("main").innerHTML = `
        <h1>🎂 Chúc mừng sinh nhật! 🎂</h1>
        <p>Bạn có muốn nhận quà?</p>
        <button onclick="transition(page2)">Nhận quà</button>
    `;
    startContinuousConfetti();
}

function page2(){
    document.getElementById("main").innerHTML = `
        <h2>Thử thách 1</h2>
        <div class="equation">
        ½(4x³ - 120πx² + 1100π²x - 3000π³)<br>
        - (x³ - 30πx² + 275π²x - 750π³) = 0
        </div>
        <input id="ans1">
        <br><button onclick="check1()">Tiếp tục</button>
    `;
}

function check1(){
    let v=document.getElementById("ans1").value.trim().toLowerCase();
    if(v==="5pi") chosen=5*Math.PI;
    else if(v==="10pi") chosen=10*Math.PI;
    else if(v==="15pi") chosen=15*Math.PI;
    else return alert("Sai");
    transition(page3);
}

function page3(){
    document.getElementById("main").innerHTML = `
        <h2>Thử thách 2</h2>
        <input id="ans2" type="number">
        <br><button onclick="check2()">Chốt</button>
    `;
}

function check2(){
    let v=Number(document.getElementById("ans2").value);
    let c=(chosen==5*Math.PI)?80:(10*chosen)/Math.PI;
    if(Math.round(v)===Math.round(c)) transition(()=>page4(c));
    else alert("Sai");
}

function page4(money){
    localStorage.setItem("cmsn_money", Math.round(money));

    let moneyDisplay = Math.round(money) * 1000;
    let kq = Math.round(money);

    let messLink = `https://m.me/nguyen.o.the.vinh?text=${encodeURIComponent("Đã nhận " + kq + "k")}`;

    document.getElementById("main").innerHTML = `
        <h1>🎉 Chúc mừng 🎉</h1>
        <div class="money-text">${moneyDisplay.toLocaleString("vi-VN")} VNĐ</div>

        <p>🎁 Nhấn để nhận quà của bạn:</p>
        <a href="${messLink}" target="_blank">
            <button>Nhận quà 🎁</button>
        </a>
    `;

    confetti({particleCount:200,spread:100});
}

page1();
</script>

</body>
</html>
