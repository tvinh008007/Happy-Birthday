<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMSN 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;

    background: 
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
        url('https://lh3.googleusercontent.com/d/1Yx0jJuyUAgEaBXOQPywPXubilDKx_YFo') no-repeat center center / cover;

    overflow: hidden;
}

.box {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    padding: 60px 40px;
    width: 95%;
    max-width: 750px;
    min-height: 350px;
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.fade-out {
    opacity: 0;
    transform: scale(0.8) translateY(30px);
    filter: blur(10px);
}

h1 { 
    font-size: 3em; 
    margin-bottom: 10px;
}

h2 { 
    color: #ffe600; 
    font-size: 2em; 
}

.equation {
    background: rgba(0, 0, 0, 0.4);
    padding: 20px;
    border-radius: 15px;
    margin: 25px 0;
    font-family: monospace;
}

input {
    padding: 15px;
    width: 75%;
    border-radius: 50px;
}

button {
    padding: 15px 35px;
    margin-top: 20px;
    border-radius: 50px;
    cursor: pointer;
}

.money-text {
    font-size: 3em;
    margin: 20px 0;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="nhacnen.MP3" type="audio/mpeg">
</audio>

<div class="box" id="main"></div>

<script>
let savedMoney = localStorage.getItem("cmsn_money");
if(savedMoney){
    window.addEventListener("load", ()=>{
        page4(Number(savedMoney));
    });
}

let chosen = 0;
let confettiInterval1; 
let isMusicPlaying = false;

function playMusic() {
    let bgm = document.getElementById("bgMusic");
    if (!isMusicPlaying) {
        bgm.volume = 0.6;
        bgm.play().catch(()=>{});
        isMusicPlaying = true;
    }
}

document.body.addEventListener('click', playMusic);

function startContinuousConfetti() {
    confettiInterval1 = setInterval(()=>{
        confetti({particleCount: 30});
    }, 300);
}

function stopConfetti() {
    clearInterval(confettiInterval1);
}

function transition(nextPage){
    stopConfetti();
    playMusic();

    let box = document.getElementById("main");
    box.classList.add("fade-out");

    setTimeout(()=>{
        nextPage();
        box.classList.remove("fade-out");
    }, 600);
}

function page1(){
    document.getElementById("main").innerHTML = `
        <h1>🎂 Chúc mừng sinh nhật! 🎂</h1>
        <p>Bạn có muốn nhận quà?</p>
        <button onclick="transition(page2)">Nhận quà</button>
    `;
    startContinuousConfetti();
}

function page2(){
    document.getElementById("main").innerHTML = `
        <h2>Thử thách 1</h2>
        <div class="equation">
        ½(4x³ - 120πx² + 1100π²x - 3000π³) <br>
        - (x³ - 30πx² + 275π²x - 750π³) = 0
        </div>

        <input id="ans1" placeholder="Nhập: (vd 16pi) " autocomplete="off">
        <br><button onclick="check1()">Tiếp tục</button>
    `;

    document.getElementById("ans1").focus();
    document.getElementById("ans1").addEventListener("keydown", e=>{
        if(e.key==="Enter") check1();
    });
}

function check1(){
    let val = document.getElementById("ans1").value.trim().toLowerCase();

    if(val==="5pi") chosen = 5*Math.PI;
    else if(val==="10pi") chosen = 10*Math.PI;
    else if(val==="15pi") chosen = 15*Math.PI;
    else{
        alert("❌ Nhập đúng: 5pi / 10pi / 15pi");
        return;
    }

    transition(page3);
}

function page3(){
    let k = Math.round(chosen / Math.PI); 

    let sum, product;

    if(k == 5){
        sum = "5π + 80";
        product = "400π";
    } else {
        sum = `${k}π + ${10*k}`;
        product = `${10*k*k}π`;
    }

    document.getElementById("main").innerHTML = `
        <h2>Thử thách 2</h2>
        <p>Biết giá trị bạn vừa nhập là nghiệm <b>x₁</b>:</p>

        <div class="equation">
        x² - (${sum})x + ${product} = 0
        </div>

        <p>Tìm nghiệm còn lại <b>x₂</b>:</p>

        <input id="ans2" type="number" autocomplete="off">
        <br><button onclick="check2()">Chốt</button>
    `;

    document.getElementById("ans2").focus();
    document.getElementById("ans2").addEventListener("keydown", e=>{
        if(e.key==="Enter") check2();
    });
}

function check2(){
    let val = Number(document.getElementById("ans2").value);
    let correct = (chosen == 5*Math.PI) ? 80 : (10 * chosen) / Math.PI;

    if(Math.round(val) === Math.round(correct)){
        transition(()=>page4(correct));
    } else {
        alert("Sai rồi 😏");
    }
}

function page4(money){
    localStorage.setItem("cmsn_money", Math.round(money));

    let moneyDisplay = Math.round(money) * 1000;

    document.getElementById("main").innerHTML = `
        <h1>🎉 Chúc mừng 🎉</h1>
        <div class="money-text" id="money">0 VNĐ</div>
        <div id="gift" style="opacity: 0;"></div>
    `;

    setTimeout(()=>{
        confetti({particleCount: 200});

        let giftDiv = document.getElementById("gift");
        let kq = Math.round(money);

        let ua = navigator.userAgent;
        let messLink;

        if(/iPhone|iPad|iPod|Android/i.test(ua)){
            messLink = "fb-messenger://user-thread/61553583331658";
        } else {
            messLink = `https://m.me/nguyen.o.the.vinh?text=${encodeURIComponent("Đã nhận " + kq + "k")}`;
        }

        giftDiv.innerHTML = `
            <p>🎁 Nhấn để nhận quà của bạn:</p>
            <a href="${messLink}" target="_blank">
                <button>Nhận quà 🎁</button>
            </a>
        `;

        giftDiv.style.opacity = 1;

    }, 1000);
}

page1();
</script>

</body>
</html>
