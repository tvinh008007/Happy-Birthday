<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- ✅ THÊM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>CMSN 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

/* ✅ THÊM */
html, body {
    height: 100dvh;
}

body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;

    background: 
        linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
        url('https://lh3.googleusercontent.com/d/1Yx0jJuyUAgEaBXOQPywPXubilDKx_YFo') no-repeat center center / cover;

    overflow: hidden;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.box {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
    border-radius: 30px;
    padding: 60px 40px;
    width: 95%;
    max-width: 750px;
    min-height: 350px;
    transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0);
}

.fade-out {
    opacity: 0;
    transform: scale(0.8) translateY(30px);
    filter: blur(10px);
}

h1 { 
    font-size: 3em; 
    margin-bottom: 10px;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    animation: floating 3s ease-in-out infinite;
}

@keyframes floating {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

h2 { 
    color: #ffe600; 
    font-size: 2em; 
    text-shadow: 0 0 10px rgba(255, 222, 0, 0.5);
}

.equation {
    background: rgba(0, 0, 0, 0.4);
    padding: 20px;
    border-radius: 15px;
    margin: 25px 0;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.2em;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

input {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 50px;
    border: 2px solid transparent;
    width: 75%;
    background: rgba(255, 255, 255, 0.9);
    color: #333;
    font-weight: 600;
    transition: all 0.3s ease;
    text-align: center;
    outline: none;
}

input:focus {
    border: 2px solid #ffe600;
    box-shadow: 0 0 20px rgba(255, 230, 0, 0.4);
    transform: scale(1.02);
}

button {
    padding: 15px 35px;
    font-size: 1.2em;
    font-weight: 800;
    border-radius: 50px;
    background: linear-gradient(45deg, #ffe600, #ff9900);
    color: #2a1b3d;
    border: none;
    margin-top: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
}

button:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 10px 25px rgba(255, 153, 0, 0.6);
}

.money-text {
    font-size: 4em;
    font-weight: 800;
    background: linear-gradient(to right, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    margin: 20px 0;
}

.gift-btn button {
    background: linear-gradient(45deg, #ff4d6d, #ff003c);
    color: white;
    box-shadow: 0 0 20px rgba(255,77,109,0.8);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,77,109,0.5); }
    50% { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,77,109,0.9); }
    100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,77,109,0.5); }
}

p {
    font-size: 1.2em;
    opacity: 0.9;
}

/* ===== THÊM HIỆU ỨNG RƠI QUÀ ===== */
.gift-drop {
    position: fixed;
    font-size: 30px;
    pointer-events: none;
    animation: dropGift 1.2s ease forwards;
    z-index: 9999;
}

@keyframes dropGift {
    0% { transform: translateY(-50px) scale(0.8); opacity: 1; }
    80% { transform: translateY(200px) scale(1.1); }
    100% { transform: translateY(250px) scale(0.9); opacity: 0; }
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
    .box { transform: scale(0.85); }
    h1 { font-size: 2.2em; }
    .money-text { font-size: 3em; }
}

/* ✅ THÊM */
@media (max-width: 768px) {
    body {
        height: 100dvh;
    }
}
</style>
</head>

<body>

<!-- overlay xoay màn hình -->
<div id="rotateWarning" style="
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
font-size:20px;
z-index:99999;
text-align:center;
padding:20px;
">
📱 Vui lòng xoay ngang màn hình để tiếp tục
</div>

<audio id="bgMusic" loop>
    <source src="nhacnen.MP3" type="audio/mpeg">
</audio>

<div class="box" id="main"></div>

<script>
let savedMoney = localStorage.getItem("cmsn_money");
if(savedMoney){
    window.addEventListener("load", ()=>{
        page4(Number(savedMoney));
    });
}

let chosen = 0;
let confettiInterval1; 
let isMusicPlaying = false;

function playMusic() {
    let bgm = document.getElementById("bgMusic");
    if (!isMusicPlaying) {
        bgm.volume = 0.6;
        let playPromise = bgm.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => { isMusicPlaying = true; }).catch(error => {});
        }
    }
}

document.body.addEventListener('click', playMusic);

/* ===== RƠI QUÀ ===== */
function dropGift(x, y){
    let gift = document.createElement("div");
    gift.className = "gift-drop";
    gift.innerHTML = "🎁";
    gift.style.left = x + "px";
    gift.style.top = y + "px";
    document.body.appendChild(gift);
    setTimeout(()=>{ gift.remove(); }, 1200);
}
document.body.addEventListener("click", e=> dropGift(e.clientX, e.clientY));

/* ===== XOAY MÀN HÌNH ===== */
function checkOrientation(){
    let w = document.getElementById("rotateWarning");
    if(window.innerHeight > window.innerWidth){
        w.style.display = "flex";
    } else {
        w.style.display = "none";
    }
}
window.addEventListener("resize", checkOrientation);
window.addEventListener("load", checkOrientation);

/* ===== PHẦN CŨ GIỮ NGUYÊN ===== */
function startContinuousConfetti() {
    let duration = 15 * 1000;
    let animationEnd = Date.now() + duration;
    let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

    function randomInRange(min, max) { return Math.random() * (max - min) + min; }

    confettiInterval1 = setInterval(function() {
        let timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) { return clearInterval(confettiInterval1); }
        let particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);
}

function stopConfetti() {
    clearInterval(confettiInterval1);
}

function transition(nextPage){
    stopConfetti();
    playMusic();

    let box = document.getElementById("main");
    box.classList.add("fade-out");

    setTimeout(()=>{
        nextPage();
        box.classList.remove("fade-out");
    }, 600);
}

function page1(){
    document.getElementById("main").innerHTML = `
        <h1>🎂 Chúc mừng sinh nhật! 🎂<br>Trần Gia Hân </h1>
        <p>Bạn có muốn nhận quà?</p>
        <button onclick="transition(page2)">Nhận quà</button>
    `;
    startContinuousConfetti();
}

/* giữ nguyên phần còn lại */
function page2(){document.getElementById("main").innerHTML=`
<h2>Thử thách 1</h2>
<div class="equation">
½(4x³ - 120πx² + 1100π²x - 3000π³) <br>
- (x³ - 30πx² + 275π²x - 750π³) = 0
</div>
<input id="ans1" placeholder="Nhập: (vd 16pi) " autocomplete="off">
<br><button onclick="check1()">Tiếp tục</button>
`;document.getElementById("ans1").focus();document.getElementById("ans1").addEventListener("keydown",e=>{if(e.key==="Enter") check1();});}

function check1(){let val=document.getElementById("ans1").value.trim().toLowerCase();
if(val==="5pi") chosen=5*Math.PI;
else if(val==="10pi") chosen=10*Math.PI;
else if(val==="15pi") chosen=15*Math.PI;
else{alert("❌ Xem lại kết quả ! Gợi ý : x³ - 30πx² + 275π²x - 750π³ = 0 ");return;}
transition(page3);}

function page3(){
let k=Math.round(chosen/Math.PI); 
let sum,product;
if(k==5){sum="5π + 80";product="400π";}
else{sum=`${k}π + ${10*k}`;product=`${10*k*k}π`;}
document.getElementById("main").innerHTML=`
<h2>Thử thách 2</h2>
<p>Biết giá trị bạn vừa nhập là nghiệm <b>x₁</b>:</p>
<div class="equation">
x² - (${sum})x + ${product} = 0
</div>
<p>Tìm nghiệm còn lại <b>x₂</b>:</p>
<input id="ans2" type="number" autocomplete="off">
<br><button onclick="check2()">Chốt</button>
`;
document.getElementById("ans2").focus();
document.getElementById("ans2").addEventListener("keydown",e=>{if(e.key==="Enter") check2();});
}

function check2(){
let val=Number(document.getElementById("ans2").value);
let correct=(chosen==5*Math.PI)?80:(10*chosen)/Math.PI;
if(Math.abs(val-correct)<0.5){transition(()=>page4(correct));}
else{alert("Sai rồi 😏");}
}

function page4(money){
localStorage.setItem("cmsn_money",Math.round(money));
let moneyDisplay=Math.round(money)*1000;
document.getElementById("main").innerHTML=`
<h1>🎉 Chúc mừng 🎉</h1>
<div class="money-text" id="money">0 VNĐ</div>
<div id="gift" style="opacity: 0; transition: opacity 1s; transform: translateY(20px);"></div>
`;
let startTime=null;let duration=2000;
function animate(t){
if(!startTime) startTime=t;
let progress=Math.min((t-startTime)/duration,1);
let easeOutQuart=1-Math.pow(1-progress,4);
let value=Math.floor(easeOutQuart*moneyDisplay);
document.getElementById("money").innerHTML=value.toLocaleString("vi-VN")+" VNĐ";
if(progress<1){requestAnimationFrame(animate);}
else{
confetti({particleCount:200,spread:100,origin:{y:0.6}});
let giftDiv=document.getElementById("gift");
let kq=Math.round(money);
let ua=navigator.userAgent;
let messLink;
if(/iPhone|iPad|iPod|Android/i.test(ua)){
messLink="fb-messenger://user-thread/61553583331658";
}else{
messLink=`https://m.me/nguyen.o.the.vinh?text=${encodeURIComponent("Đã nhận "+kq+"k")}`;
}
giftDiv.innerHTML=`
<p>🎁 Nhấn để nhận quà của bạn:</p>
<a href="${messLink}" target="_blank">
<button>Nhận quà 🎁</button>
</a>
`;
giftDiv.style.opacity=1;
giftDiv.style.transform="translateY(0)";
}}
requestAnimationFrame(animate);
}

page1();
</script>

</body>
</html>
